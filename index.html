<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ============================================
         IDENTITAS DASAR
         ============================================ -->
  <title>Muhammad Izzul Islam — Tax & Accounting Portfolio</title>
  <meta name="description"
    content="Portfolio profesional Muhammad Izzul Islam — Sarjana Akuntansi Syariah, Teknisi Pajak Bersertifikat (CTT), dan praktisi perpajakan dengan pengalaman di DJP dan sektor swasta." />
  <meta name="author" content="Muhammad Izzul Islam" />
  <meta name="keywords"
    content="Muhammad Izzul Islam, portfolio, akuntansi, perpajakan, teknisi pajak, CTT, DJP, akuntansi syariah" />

  <!-- ============================================
         OPEN GRAPH — untuk WhatsApp, LinkedIn, Facebook
         Saat link dibagikan, platform membaca tag ini
         untuk menampilkan preview judul + gambar.
         ============================================ -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://mizzulislam.vercel.app/" />
  <meta property="og:title" content="Muhammad Izzul Islam — Tax & Accounting Portfolio" />
  <meta property="og:description"
    content="Sarjana Akuntansi Syariah & Teknisi Pajak Bersertifikat. Berpengalaman dalam kepatuhan pajak, pelaporan keuangan, dan solusi digital perpajakan." />
  <!--
      CATATAN: Ganti URL gambar di bawah dengan URL gambar portfolio Anda
      yang sudah di-deploy. Ukuran ideal: 1200x630 piksel (format JPG/PNG).
    -->
  <meta property="og:image" content="https://mizzulislam.vercel.app/assets/portfolio/izzul-1.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="id_ID" />
  <meta property="og:locale:alternate" content="en_US" />
  <meta property="og:site_name" content="Izzul Islam Portfolio" />

  <!-- ============================================
         TWITTER CARD — untuk pratinjau di Twitter/X
         summary_large_image = tampilkan gambar besar
         ============================================ -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Muhammad Izzul Islam — Tax & Accounting Portfolio" />
  <meta name="twitter:description"
    content="Sarjana Akuntansi Syariah & Teknisi Pajak Bersertifikat. Berpengalaman dalam kepatuhan pajak dan solusi digital perpajakan." />
  <meta name="twitter:image" content="https://mizzulislam.vercel.app/assets/portfolio/izzul-1.png" />

  <!-- ============================================
         FAVICON — ikon kecil yang muncul di tab browser
         ============================================ -->
  <link rel="icon" type="image/png" href="/portfolio-logo.png" />
  <link rel="apple-touch-icon" href="/portfolio-logo.png" />

  <!-- ============================================
         CANONICAL — memberitahu Google URL resmi halaman ini
         Penting untuk SEO agar tidak ada duplikat indeks
         ============================================ -->
  <link rel="canonical" href="https://mizzulislam.vercel.app/" />

  <!-- Warna address bar di mobile browser -->
  <meta name="theme-color" content="#020617" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
